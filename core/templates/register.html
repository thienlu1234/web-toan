<!DOCTYPE html>
<html>

<head>
    <title>Đăng ký</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0984e3;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0652dd;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Đăng ký</h2>

        {% if error %}
        <p style="color:red">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input name="username" placeholder="Tên đăng nhập">
            <input type="password" name="password" placeholder="Mật khẩu">
            <button type="submit">Đăng ký</button>
        </form>

        <a href="/login/">Đã có tài khoản? Đăng nhập</a>
    </div>

</body>

</html>
