<!DOCTYPE html>
<html>

<head>
    <title>Đăng ký</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .box {
            width: 400px;
        }

        h2 {
            text-align: center;
        }

        label {
            font-size: 14px;
            margin-top: 15px;
            display: block;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            background: #eef1f5;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #0984e3;
            color: white;
            border: none;
            border-radius: 8px;
        }

        button:hover {
            background: #0652dd;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Đăng ký</h2>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Họ và tên *</label>
            <input name="fullname" required>

            <label>Tên tài khoản *</label>
            <input name="username" required>

            <label>Mật khẩu *</label>
            <input type="password" name="password" required>

            <label>Xác nhận lại mật khẩu *</label>
            <input type="password" name="confirm_password" required>

            <label>Email *</label>
            <input name="email" required>

            <label>Số điện thoại *</label>
            <input name="phone" required>

            <label>Giới tính</label>
            <select name="gender">
                <option>Nam</option>
                <option>Nữ</option>
            </select>

            <label>Năm sinh *</label>
            <input name="birth" required>

            <button type="submit">Đăng ký</button>
        </form>

    </div>

</body>

</html>
