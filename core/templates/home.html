{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Toán Mpecplus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- favicon -->
    <link rel="icon" href="{% static 'images/logo.png' %}">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f6fa;
        }

        /* NAVBAR */
        .navbar {
            background: #2f3640;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LOGO */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-decoration: none;
        }

        .logo img {
            height: 35px;
        }

        .logo span {
            font-weight: bold;
            font-size: 18px;
        }

        /* MENU RIGHT */
        .right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .right a {
            color: white;
            text-decoration: none;
            font-size: 15px;
        }

        .right a:hover {
            color: #fbc531;
        }

        /* USER */
        .user {
            color: #fbc531;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        /* BUTTON */
        .btn {
            background: #e84118;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn:hover {
            background: #c23616;
        }
    </style>
</head>

<body>

    <div class="navbar">

        <!-- LEFT -->
        <div class="left">
            <a href="{% url 'home' %}" class="logo">
                <img src="{% static 'images/logo.png' %}">
                <span>Toán Mpecplus</span>
            </a>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <a href="{% url 'home' %}">Trang chủ</a>
            <a href="{% url 'courses' %}">Khóa học</a>
            <a href="#">Liên hệ</a>

            {% if user.is_authenticated %}
            <span class="user">👋 {{ user.username }}</span>
            <a href="{% url 'logout' %}">Đăng xuất</a>
            {% else %}
            <a href="{% url 'login' %}">Đăng nhập</a>
            <a href="{% url 'register' %}">Đăng ký</a>
            {% endif %}
        </div>

    </div>

    <div class="hero">
        <h1>Học Toán cấp 2 dễ hiểu 🚀</h1>
        <p>Nền tảng học toán dành cho học sinh cấp 2</p>
        <br>
        <a class="btn" href="{% url 'courses' %}">Bắt đầu học</a>
    </div>

</body>

</html>
