{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Toán Mpecplus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- favicon -->
    <link rel="icon" href="{% static 'images/logo.png' %}">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f6fa;
        }

        .navbar {
            background: #2f3640;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 40px;
        }

        .logo span {
            font-weight: bold;
            font-size: 18px;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .btn {
            background: #e84118;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn:hover {
            background: #c23616;
            
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
        }    
    </style>
</head>
<body>

    <div class="navbar">

        <!-- LOGO -->
        <a href="{% url 'home' %}" class="logo">
            <img src="{% static 'images/logo.png' %}">
            <span>Toán Mpecplus</span>
        </a>

        <!-- MENU -->
        <div>
            <a href="{% url 'home' %}">Trang chủ</a> |
            <a href="{% url 'courses' %}">Khóa học</a> |
            Liên hệ
        </div>
        <a href="/login/">Đăng nhập</a> |
        <a href="/register/">Đăng ký</a>

    </div>

    <div class="hero">
        <h1>Học Toán cấp 2 dễ hiểu 🚀</h1>
        <p>Nền tảng học toán dành cho học sinh cấp 2</p>
        <br>
        <a class="btn" href="{% url 'courses' %}">Bắt đầu học</a>
    </div>

</body>
</html>
