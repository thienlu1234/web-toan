<!DOCTYPE html>
<html>

<head>
    <title>{{ lesson.name }}</title>
</head>

<body style="font-family: Arial; margin: 0;">

    <div style="display: flex; height: 100vh;">

        <!-- SIDEBAR -->
        <div style="width: 300px; background: #f5f5f5; padding: 20px; overflow-y: auto;">
            <h3>📚 Danh sách bài học</h3>

            {% for l in lesson.course.lesson_set.all %}
            <div style="margin: 10px 0;">
                <a href="{% url 'lesson_detail' l.id %}"
                    style="text-decoration: none; {% if l.id == lesson.id %}color: red;{% else %}color: black;{% endif %}">
                    ▶ {{ l.name }}
                </a>
            </div>
            {% endfor %}
        </div>

        <!-- VIDEO -->
        <div style="flex: 1; padding: 40px;">
            <h1>{{ lesson.name }}</h1>

            {% if lesson.get_embed_url %}
            <iframe width="100%" height="500" src="{{ lesson.get_embed_url }}" title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
            {% else %}
            <p>Chưa có video</p>
            {% endif %}
        </div>

    </div>

</body>

</html>
