{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Khóa học</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none;
            color: black;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            padding: 10px;
        }

        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

<h1>📚 Chọn lớp học</h1>

<div class="grid">

    <div class="card">
        <img src="{% static 'images/toan6.png' %}">
        <h3>Lớp 6</h3>
    </div>

    <div class="card">
        <img src="{% static 'images/toan7.png' %}">
        <h3>Lớp 7</h3>
    </div>

    <div class="card">
        <img src="{% static 'images/toan8.png' %}">
        <h3>Lớp 8</h3>
    </div>

    <div class="card">
        <img src="{% static 'images/toan9.png' %}">
        <h3>Lớp 9</h3>
    </div>

</div>

</body>
</html>
